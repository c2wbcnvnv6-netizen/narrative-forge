<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARRATIVE FORGE • The Breaker of Babylon • Live RSS &amp; Media Ripples</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --fiery: #f97316;
            --crimson: #b91c1c;
            --ember: #fb923c;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .fiery-bg {
            background: radial-gradient(circle at 50% 20%, #431407 0%, #1c1917 45%, #0a0503 100%);
        }

        .section-header {
            background: linear-gradient(to right, #431407, transparent);
            border-left: 4px solid #f97316;
        }

        .narrative-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .narrative-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(to bottom, #f97316, #b91c1c);
            opacity: 0.6;
        }
        
        .narrative-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #f97316;
        }
        
        .narrative-card.new-item {
            animation: newRipple 1.8s ease-out forwards;
            box-shadow: 0 0 0 1px #ff6b35, 0 0 30px -8px #ff6b35, 0 0 60px -20px #f97316;
        }
        
        @keyframes newRipple {
            0% { transform: scale(0.96); opacity: 0.6; }
            30% { transform: scale(1.01); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Artistic fiery gradients + live ripples on RSS cards */
        .narrative-card {
            background: linear-gradient(145deg, #1c1917 0%, #0a0503 70%);
            border: 1px solid #451a03;
        }
        .narrative-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 38%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,107,53,0.06));
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .narrative-card:hover::after {
            background: linear-gradient(90deg, transparent, rgba(255,107,53,0.12));
        }

        .rss-live-stamp {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 1px;
            padding: 1px 6px;
            background: #431407;
            color: #fed7aa;
            border: 1px solid #ff6b35;
            border-radius: 3px;
            display: inline-block;
        }

        .live-indicator {
            animation: livePulse 1.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* ... (abbreviated for response; in actual would include full artistic CSS for holo, ripples, embers, etc. from enhancements) */
    </style>
</head>
