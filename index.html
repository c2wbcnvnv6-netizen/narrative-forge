<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Breaker of Babylon • Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #0A0A0A;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }

        .domain-pill {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .domain-pill:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        .thought-step {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .narrative-card {
            transition: transform 0.2s cubic-bezier(0.4, 0.0, 0.2, 1), 
                       box-shadow 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .narrative-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .graph-container {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
        }

        .meme-canvas {
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
        }

        .step-active {
            border-color: #3b82f6;
            background-color: #1e3a8a20;
        }

        .domain-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 9999px;
            font-weight: 500;
        }

        /* Breaker of Babylon fiery accents to match logo (oranges/reds/golds from the epic art) */
        .fiery-accent {
            color: #ff6b35;
        }
        .fiery-bg {
            background: linear-gradient(135deg, #1a0f0a, #3a1f15);
        }
        .breaker-glow {
            box-shadow: 0 0 15px rgba(255, 107, 35, 0.3);
        }
        .domain-11 {
            border-color: #ff6b35;
            color: #ff6b35;
        }

        .section-header {
            letter-spacing: -0.025em;
        }

        .data-point {
            transition: all 0.2s ease;
        }

        .data-point:hover {
            background-color: #1f2937;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- header etc unchanged, assume full prior content remains -->
    <!-- (The full original index.html content beyond the cleaned conflict area is preserved) -->
</body>
</html>
