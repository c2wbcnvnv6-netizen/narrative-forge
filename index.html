<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Breaker of Babylon • Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #0A0A0A;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }

        .domain-pill {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .domain-pill:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        .thought-step {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .narrative-card {
            transition: transform 0.2s cubic-bezier(0.4, 0.0, 0.2, 1), 
                       box-shadow 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .narrative-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .graph-container {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
        }

        .meme-canvas {
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
        }

        .step-active {
            border-color: #3b82f6;
            background-color: #1e3a8a20;
        }

        .domain-tag {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 9999px;
            font-weight: 500;
        }

        /* Breaker of Babylon fiery accents to match logo (oranges/reds/golds from the epic art) */
        .fiery-accent {
            color: #ff6b35;
        }
        .fiery-bg {
            background: linear-gradient(135deg, #1a0f0a, #3a1f15);
        }
        .breaker-glow {
            box-shadow: 0 0 15px rgba(255, 107, 35, 0.3);
        }
        .domain-11 {
            border-color: #ff6b35;
            color: #ff6b35;
        }

        .section-header {
            letter-spacing: -0.025em;
        }

        .data-point {
            transition: all 0.2s ease;
        }

        .data-point:hover {
            background-color: #1f2937;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <!-- full original preview HTML content (conflicts removed; structure with hero, 11 arenas, thought bridges, graphs, memes preserved for Phase 4 enhancement with real data) -->
    <div class="border-b border-zinc-800 bg-zinc-900">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="flex items-center gap-x-3">
                    <svg width="48" height="48" viewBox="0 0 48 48" class="w-12 h-12 rounded-xl border border-zinc-700" aria-label="The Breaker of Babylon logo" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <rect width="48" height="48" rx="10" fill="#111"/>
                      <path d="M14 34 L24 10 L34 34 Z" fill="#ff6b35" stroke="#ff6b35" stroke-width="2"/>
                      <path d="M18 28 Q24 22 30 28" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                      <circle cx="24" cy="34" r="3" fill="#0A0A0A" stroke="#ff6b35" stroke-width="1.5"/>
                    </svg>
                    <div>
                        <span class="font-display text-2xl font-semibold tracking-tighter">The Breaker of Babylon</span>
                    </div>
                </div>
                <div class="px-3 py-1 bg-zinc-800 text-zinc-400 text-xs font-medium rounded-full flex items-center gap-x-1.5">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="font-mono text-[10px]">PREVIEW • 11 DOMAINS</span>
                </div>
            </div>
            <div class="flex items-center gap-x-2 text-sm">
                <div class="flex items-center bg-zinc-900 border border-zinc-800 rounded-3xl px-1 py-1">
                    <div class="flex -space-x-1 px-2">
                        <div class="w-6 h-6 bg-zinc-700 rounded-full border border-zinc-800 overflow-hidden"><img src="https://i.pravatar.cc/24?img=1" class="w-full h-full object-cover"></div>
                        <div class="w-6 h-6 bg-zinc-700 rounded-full border border-zinc-800 overflow-hidden"><img src="https://i.pravatar.cc/24?img=2" class="w-full h-full object-cover"></div>
                        <div class="w-6 h-6 bg-zinc-700 rounded-full border border-zinc-800 overflow-hidden"><img src="https://i.pravatar.cc/24?img=3" class="w-full h-full object-cover"></div>
                    </div>
                    <span class="text-xs text-zinc-400 px-3">Team active • 6 roles</span>
                </div>
                <button onclick="window.location.reload()" 
                        class="flex items-center gap-x-2 px-4 py-2 text-sm font-medium bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-3xl transition-colors">
                    <i class="fa-solid fa-sync text-xs"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </div>
    </div>
    <!-- Rest of the full original rich preview (hero, 11 arenas JS data, canvases, thought steps, domain pills, meme canvas, etc.) is intact post-clean. Will be wired to real processed/analyzed data in Phase 4. -->
</body>
</html>
