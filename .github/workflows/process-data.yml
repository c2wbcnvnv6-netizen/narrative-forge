name: Process Ingested Data (analysis/pipeline stage)

on:
  workflow_dispatch:
    inputs:
      arena:
        description: 'Arena / domain (e.g. finance, congress, media, news). Use "news" for RSS ingested items (raw/news/* or raw/media/rss-*)'
        required: true
        default: 'media'
      raw_key:
        description: 'S3 key of the raw file in babylon-raw-data (rss examples: raw/news/rss-*.html or raw/media/rss-*.xml)'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas boto3 pypdf beautifulsoup4 lxml

      - name: Process raw data and save summary (CSV + documents/PDF/HTML support)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          ARENA: ${{ github.event.inputs.arena }}
          RAW_KEY: ${{ github.event.inputs.raw_key }}
          BUCKET_NAME: babylon-raw-data
        run: python scripts/process_data.py

      - name: Notify processed
        run: |
          echo "Processing complete for arena=${{ github.event.inputs.arena }}. Summary in processed/ prefix. Rich extraction + basic analysis for documents now available."
          echo "For RSS/news (arena=news): text extract from article HTML or RSS XML; entities/signals for downstream news features in analyze."
          echo "Auto-chaining from monitor: RSS -> this process -> analyze-data (new news features) -> profiles if entities."
