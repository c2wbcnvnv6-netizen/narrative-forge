name: Process Ingested Data (analysis/pipeline stage)

on:
  workflow_dispatch:
    inputs:
      arena:
        description: 'Arena / domain (e.g. finance, congress)'
        required: true
        default: 'finance'
      raw_key:
        description: 'S3 key of the raw CSV in babylon-raw-data'
        required: true
        default: 'raw/finance/cfda-reference.csv'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas boto3

      - name: Process raw data and save summary
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          ARENA: ${{ github.event.inputs.arena }}
          RAW_KEY: ${{ github.event.inputs.raw_key }}
        run: |
          python -c '
          import boto3
          import pandas as pd
          import io
          import json
          import os
          from datetime import datetime

          print(f"Processing raw data for arena={os.environ["ARENA"]} key={os.environ["RAW_KEY"]}")

          s3 = boto3.client(
              "s3",
              endpoint_url=os.environ["R2_ENDPOINT"],
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
          )

          obj = s3.get_object(Bucket="babylon-raw-data", Key=os.environ["RAW_KEY"])
          df = pd.read_csv(io.BytesIO(obj["Body"].read()))

          summary = {
              "arena": os.environ["ARENA"],
              "raw_key": os.environ["RAW_KEY"],
              "shape": list(df.shape),
              "columns": list(df.columns)[:15],
              "head_sample": df.head(3).to_dict("records") if len(df) > 0 else [],
              "processed_at": datetime.utcnow().isoformat() + "Z"
          }

          # Simple analysis - for cfda-like data
          if "Agency Name" in df.columns:
              summary["top_agencies_count"] = df["Agency Name"].value_counts().head(5).to_dict()
          if len(df.select_dtypes(include=["number"]).columns) > 0:
              summary["numeric_summary"] = df.describe().to_dict()

          processed_key = f"processed/{summary["arena"]}/{summary["raw_key"].split("/")[-1].replace(".csv", "")}-summary.json"
          s3.put_object(
              Bucket="babylon-raw-data",
              Key=processed_key,
              Body=json.dumps(summary, indent=2),
              ContentType="application/json"
          )

          print(f"Processed summary saved to {processed_key}")
          print(json.dumps(summary, indent=2)[:800])
          '

      - name: Notify processed
        run: echo "Processing complete for arena=${{ github.event.inputs.arena }}. Summary in processed/ prefix."
