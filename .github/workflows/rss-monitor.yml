name: Lightweight RSS News Monitor (Liveness - High Frequency, Low Overhead)

on:
  schedule:
    # Dedicated lightweight RSS cron: every 30 minutes for liveness (no full backfill, small max_new)
    # Keeps news feeds fresh for real-time narrative signals without the cost of broad daily monitor.
    # GH Actions supports this cadence; fires only rss_news source.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      max_new:
        description: 'Max new RSS items (keep small for liveness; default 8)'
        required: false
        default: '8'
      dry_run:
        description: 'Dry run (discover only)'
        required: false
        default: 'false'
      auto_process:
        description: 'Auto-trigger Process then Analyze for news features'
        required: false
        default: 'true'

jobs:
  rss_liveness:
    runs-on: ubuntu-latest
    permissions:
      actions: write   # required to auto-trigger process-data + analyze-data
      contents: read
    concurrency:
      group: rss-monitor-${{ github.ref }}
      cancel-in-progress: true  # Efficiency: prevent overlap on frequent 30min schedule
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (light for RSS)
        run: |
          python -m pip install --upgrade pip
          pip install requests boto3

      - name: Run monitor focused on rss_news only (lightweight liveness)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BUCKET_NAME: babylon-raw-data
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          # Enable Phase1 rich AI (smart_extract) + Phase2 embed wire on GH inflows/cron (Worker auto-sinks to ckg-holo-analytics too). Matches monitor-ingest.
          BABYLON_AI_WORKER_URL: https://babylon-data-ai.c2wbcnvnv6.workers.dev/extract
          # Optional: FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }} (for hybrid high-quality extract)
        run: |
          python scripts/monitor_and_ingest.py \
            --sources "rss_news" \
            --max-new "${{ github.event.inputs.max_new || 8 }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }} \
            ${{ github.event.inputs.auto_process != 'false' && '--auto-process' || '' }}

      - name: Summary (RSS liveness focus)
        run: |
          echo "Lightweight RSS monitor complete (every 30min cadence)."
          echo "Ingests only from rss_news -> raw/news/ (article HTMLs) + raw/media/rss-*.xml (feed snapshots)."
          echo "Auto chaining enabled: rss ingest -> process (text extract + entities) -> analyze (news features: repeated phrases, framing, timelines, tactic scores from current events) ."
          echo "Liveness benefits: detects breaking gov/media releases in <30min window vs daily full scan."
          echo "Efficient: small max_new, short internal RSS windows (hours vs days), parallel feed fetches in discover (futures), no heavy sources."
          echo "Check logs for per-feed liveness counts + NOTIFY markers. Use health checks for last-hour items."
          echo "For deeper: manual dispatch backfill.yml with --sources rss_news + backfill_level=deep."
          echo "Paths verified: raw/news/ and raw/media/ supported in health + Cloudflare R2."

      - name: RSS-specific health hint (optional inline check)
        run: |
          echo "Post-run: run scripts/check_r2_health.py --rss (or via separate health workflow) to verify counts in raw/news/, liveness (items last hour), R2 hits, NOTIFYs."
