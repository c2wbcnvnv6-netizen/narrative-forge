name: Simple Backfill Download System (Dedicated, Reliable Historical Ingest)

on:
  workflow_dispatch:
    inputs:
      max_new:
        description: 'Max new items (high default for backfill)'
        required: false
        default: '800'
      dry_run:
        description: 'Dry run (discover only)'
        required: false
        default: 'false'
      force:
        description: 'Force mode — bypass some manifest/key_exists checks for aggressive historical pull'
        required: false
        default: 'false'
      backfill_level:
        description: 'Backfill depth level (light | medium | deep). Deep expands ranges in discovers.'
        required: false
        default: 'deep'
      sources:
        description: 'Comma-separated sources (default focused on politicians + docs for profiles; include rss_news for deeper historical news coverage)'
        required: false
        default: 'politicians_fec,politicians_congress,politicians_courts_recap,politicians_state_elections,politicians_opensecrets,court_documents,press_releases,crs_gao_reports,foia_documents,rss_news'
      arena:
        description: 'Optional arena filter (e.g. politicians, documents). Empty for all in sources.'
        required: false
        default: ''
  schedule:
    # Weekly backfill maintenance (Sundays) - keeps historical up to date without daily noise
    - cron: '0 6 * * 0'

permissions:
  contents: read
  actions: write   # for triggering other workflows later

concurrency:
  group: backfill-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests boto3

      - name: Compute smart schedule parameters (weekly deep every 4 weeks)
        id: schedule
        run: |
          WEEK=$(date +%U)
          if [ $((10#$WEEK % 4)) -eq 0 ]; then
            echo "backfill_level=deep" >> $GITHUB_OUTPUT
            echo "max_new=1000" >> $GITHUB_OUTPUT
            echo "Using DEEP backfill (every 4th Sunday)"
          else
            echo "backfill_level=medium" >> $GITHUB_OUTPUT
            echo "max_new=500" >> $GITHUB_OUTPUT
            echo "Using MEDIUM backfill (regular weekly)"
          fi
          # Arena can be set via manual trigger; default empty for all
          echo "arena=${{ github.event.inputs.arena || '' }}" >> $GITHUB_OUTPUT

      - name: Run Improved Simple Backfill System
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BUCKET_NAME: babylon-raw-data
          GITHUB_REPOSITORY: ${{ github.repository }}
          SUBAGENT_TAG: BACKFILL-DEPLOYER-HEAVY  # subagent tag for live indicators visibility + rule42 + R2 rates
          # Enable rich AI via monitor_and_ingest smart_extract (backfill reuses it for RSS/historical + politicians/docs)
          # Produces rule42_pipeline_hints + detailed_per_signal_explanations for R2 + pipeline_status with rule42_metrics
          BABYLON_AI_WORKER_URL: https://babylon-data-ai.c2wbcnvnv6.workers.dev/extract
          # Optional: FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # PIPELINE_STATUS_FILE auto used; rate tuned in script default
        run: |
          python scripts/simple_backfill.py \
            --max-new "${{ steps.schedule.outputs.max_new || github.event.inputs.max_new || '800' }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }} \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }} \
            --backfill-level "${{ steps.schedule.outputs.backfill_level || github.event.inputs.backfill_level || 'deep' }}" \
            --sources "${{ github.event.inputs.sources || 'politicians_fec,politicians_congress,politicians_courts_recap,politicians_state_elections,politicians_opensecrets,court_documents,press_releases,crs_gao_reports,foia_documents,rss_news' }}" \
            ${{ steps.schedule.outputs.arena && format('--arena {0}', steps.schedule.outputs.arena) || '' }} \
            ${{ github.event.inputs.arena && format('--arena {0}', github.event.inputs.arena) || '' }} \
            --rate-limit "0.3"  # decent rate for backfill
            --status-file pipeline_status.json

      - name: Upload backfill log artifact (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-log-${{ github.run_id }}
          path: backfill_log.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "=== Simple Backfill Complete ==="
          echo "Inputs:"
          echo "  max_new: ${{ github.event.inputs.max_new || '800' }}"
          echo "  dry_run: ${{ github.event.inputs.dry_run || 'false' }}"
          echo "  force: ${{ github.event.inputs.force || 'false' }}"
          echo "  backfill_level: ${{ github.event.inputs.backfill_level || 'deep' }}"
          echo "  sources: ${{ github.event.inputs.sources || 'default' }}"
          echo "  arena: ${{ github.event.inputs.arena || '' }}"
          echo ""
          echo "Effective (computed for schedule or from inputs):"
          echo "  effective_force: ${{ github.event.inputs.force || 'false' }}"
          echo "  effective_backfill_level: ${{ steps.schedule.outputs.backfill_level || github.event.inputs.backfill_level || 'deep' }}"
          echo "  effective_max_new: ${{ steps.schedule.outputs.max_new || github.event.inputs.max_new || '800' }}"
          echo "  effective_arena: ${{ steps.schedule.outputs.arena || github.event.inputs.arena || '' }}"
          echo ""
          echo "Check the uploaded backfill_log.json artifact for structured details (status, ingested_count, force, level)."
          echo "Data is written to R2 under raw/politicians/ and raw/documents/ (and processed/ for analysis). rss_news goes to raw/news/ + raw/media/rss-* (deeper historical when --backfill-level deep)."
          echo "Follow up with the profiles or analyze workflows if desired."
          echo "This workflow also runs automatically every Sunday at 06:00 UTC for ongoing maintenance."
          echo "RSS backfill: use --sources rss_news + deep for historical news story coverage (auto chains to process/analyze)."