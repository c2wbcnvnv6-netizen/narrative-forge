name: Analyze Processed Data (synthesis, graphs, timelines, tactics)

on:
  workflow_dispatch:
    inputs:
      processed_key:
        description: 'Processed summary key (e.g. processed/documents/...-summary.json OR processed/news/rss-*-summary.json for live RSS narrative detection / media coordination)'
        required: true
      batch:
        description: 'Comma-separated list of additional processed keys (optional, supports mixed + high-volume news batches e.g. processed/news/rss-nyt-politics-...,processed/news/rss-ap-top-... for outlet similarity + echo scores)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run only'
        required: false
        default: 'false'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps (light)
        run: |
          python -m pip install --upgrade pip
          pip install boto3
      - name: Run substantial analysis (news/RSS extended: extract title+desc, improved repeated for media framing, outlet graph, echo_chamber_scores, news_ripples in synth, pol framing integration. Batch + efficiency for volume.)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          BUCKET_NAME: babylon-raw-data
          PROCESSED_KEY: ${{ github.event.inputs.processed_key }}
          BATCH_KEYS: ${{ github.event.inputs.batch }}
        run: |
          set -e
          if [ -n "$BATCH_KEYS" ]; then
            # Split comma list safely for --batch-keys (nargs +)
            IFS=',' read -ra KEYS <<< "$BATCH_KEYS"
            python scripts/analyze_data.py --batch-keys "${KEYS[@]}" ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
          else
            python scripts/analyze_data.py --processed-key "${{ github.event.inputs.processed_key }}" ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
          fi
      - name: Notify
        run: |
          echo "Analysis complete. Check processed/derived/ for graph/timeline/synthesis + news_ripples (when news keys present)."
          echo "NOTIFY markers + live RSS signals (echo scores, outlet similarity, media framing of pols) emitted for site subagent / UI."
          echo "RSS subagent tie: new RSS (raw/news/) -> process (news arena) -> analyze (this) produces live narrative detection."
