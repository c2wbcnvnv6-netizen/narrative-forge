name: Test R2 Raw-Data Bucket Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: List contents of babylon-raw-data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT }}
        run: |
          echo "Testing connection to R2 bucket babylon-raw-data..."
          aws s3 ls s3://babylon-raw-data || true
          echo "Test complete (empty output = bucket exists but has no objects yet)."
